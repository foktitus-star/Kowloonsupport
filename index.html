    });

    map.on('style.load', () => {
        const layers = map.getStyle().layers;
        
        for (const layer of layers) {
            const id = layer.id;
            let keep = false;
            
            // 1. 底色背景
            if (id === 'background') {
                keep = true;
                map.setPaintProperty(id, 'background-color', '#f3efe6');
            } 
            // 2. 建築物
            else if (id.includes('building')) {
                keep = true;
                map.setPaintProperty(id, 'fill-color', '#d6cca4');
                try { map.setPaintProperty(id, 'fill-outline-color', '#bfae83'); } catch(e){}
                try { map.setPaintProperty(id, 'fill-opacity', 0.45); } catch(e){}
            }
            // 3. 街道大類 (不含水路徑)
            else if ((id.includes('road') || id.includes('bridge') || id.includes('tunnel')) && !id.includes('water')) {
                keep = true;
                if (layer.type === 'line') {
                    map.setPaintProperty(id, 'line-color', '#d5baba'); 
                } else if (layer.type === 'symbol') {
                    map.setPaintProperty(id, 'text-color', '#5d4d3a');
                    map.setPaintProperty(id, 'text-halo-color', '#f3efe6');
                    try { map.setPaintProperty(id, 'text-halo-width', 2); } catch(e){}
                }
            }
            // 4. 水體圖層（海岸線與海洋）
            else if (id.includes('water') || id.includes('coastline') || id.includes('marine')) {
                keep = true;
                if (layer.type === 'fill') {
                    map.setPaintProperty(id, 'fill-color', '#b8c5c7'); 
                } else if (layer.type === 'line') {
                    map.setPaintProperty(id, 'line-color', '#a2b0b4');
                }
            }
            // 5. 公園與綠地 (大地綠色)
            else if (id.includes('park') || id.includes('grass') || id.includes('wood') || id.includes('landcover') || id.includes('green') || id.includes('leisure')) {
                keep = true;
                if (layer.type === 'fill') {
                    // 大地色系綠意
                    map.setPaintProperty(id, 'fill-color', '#c5cca1'); 
                    try { map.setPaintProperty(id, 'fill-opacity', 0.45); } catch(e){}
                }
            }
            // 6. 原有圖層的交通與車站遮蔽，確保與我們自己抓取的路軌不衝突
            else if (id.includes('station') || id.includes('transit') || id.includes('railway') || id.includes('transportation') || id.includes('poi')) {
                keep = false;
            }
            
            if (!keep) {
                map.setLayoutProperty(id, 'visibility', 'none');
            } else {
                map.setLayoutProperty(id, 'visibility', 'visible');
            }

    document.getElementById('download-btn').addEventListener('click', () => {

    });

        // 先稍微改變按鈕外觀提示用戶正在處理
        const btn = document.getElementById('download-full-btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '處理中...';
        
        html2canvas(document.getElementById('map'), {
            useCORS: true,       // 允許跨域圖片（例如確保抓到底圖）

            scale: window.devicePixelRatio || 2 // 確保高解析機型會輸出 Retina 高清大圖

            const a = document.createElement('a');
