<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Kowloon Map - Earth Colors</title>
<script src="https://unpkg.com/maplibre-gl@^3.6.0/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@^3.6.0/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  body { 
    margin: 0; 
    padding: 0; 
    font-family: 'Helvetica Neue', Arial, sans-serif; 
    background-color: #f3efe6; 
  }
  #map { 
    position: absolute; 
    top: 0; 
    bottom: 0; 
    width: 100%; 
    display: none; 
  }
  #upload-ui { 
    position: absolute; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%); 
    text-align: center; 
  }
  .upload-box { 
    background: white; 
    padding: 40px; 
    border-radius: 12px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
    color: #5d4d3a;
  }
  .upload-box h2 {
    margin-top: 0;
    color: #8c7355;
  }
  .upload-box input[type="file"] { 
    margin-top: 20px; 
    padding: 10px;
    background: #faf8f5;
    border: 1px dashed #d6cca4;
    border-radius: 8px;
    width: 100%;
    box-sizing: border-box;
    cursor: pointer;
  }
  #loading { 
    display: none; 
    margin-top: 20px; 
    color: #a46d3e; 
    font-weight: bold; 
    font-size: 1.1em;
  }
  .badge {
    background: #d8aa6c;
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 0.8em;
  }
</style>
</head>
<body>
<div id="upload-ui">
  <div class="upload-box">
    <h2>Kowloon Map <span class="badge">Earth Colors</span></h2>
    <p>已經排除記憶體超載問題，啟用「極速逐行特徵轉譯」。</p>
    <p>請再次選擇旁邊的 <strong>map-13.osm</strong> 檔案：</p>
    <input type="file" id="osmFile" accept=".osm, .xml" />
    <div id="loading">✨ 載入與極速轉譯中...</div>
  </div>
</div>
<div id="map"></div>

<script>
document.getElementById('osmFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(!file) return;
    
    document.getElementById('loading').style.display = 'block';
    
    const reader = new FileReader();
    reader.onload = function(evt) {
        setTimeout(() => processOSM(evt.target.result), 50);
    };
    reader.readAsText(file);
});

function processOSM(xmlString) {
    console.log("Parsing OSM via high-performance string reader...");
    try {
        const nodes = new Map();
        const features = [];
        
        let currentElement = null;
        let currentCoords = [];
        let currentTags = {};
        
        const lines = xmlString.split('\n');
        
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line.startsWith('<node')) {
                const idMatch = line.match(/id="(\d+)"/);
                const latMatch = line.match(/lat="([\d\.-]+)"/);
                const lonMatch = line.match(/lon="([\d\.-]+)"/);
                
                if (idMatch && latMatch && lonMatch) {
                    const lat = parseFloat(latMatch[1]);
                    const lon = parseFloat(lonMatch[1]);
                    nodes.set(idMatch[1], [lon, lat]);
                    
                    if (!line.endsWith('/>')) {
                        currentElement = 'node';
                        currentTags = {};
                        currentCoords = [lon, lat];
                    }
                }
            } 
            else if (line.startsWith('<way')) {
                 if (!line.endsWith('/>')) {
                     currentElement = 'way';
                     currentTags = {};
                     currentCoords = [];
                 }
            }
            else if (line.startsWith('<nd')) {
                if (currentElement === 'way') {
                    const refMatch = line.match(/ref="(\d+)"/);
                    if (refMatch) {
                        const coord = nodes.get(refMatch[1]);
                        if (coord) currentCoords.push(coord);
                    }
                }
            }
            else if (line.startsWith('<tag')) {
                if (currentElement) {
                    const kMatch = line.match(/k="([^"]+)"/);
                    const vMatch = line.match(/v="([^"]+)"/);
                    if (kMatch && vMatch) {
                        currentTags[kMatch[1]] = vMatch[1];
                    }
                }
            }
            else if (line.startsWith('</node>')) {
                if (currentElement === 'node') {
                    const r = currentTags['railway'];
                    const pt = currentTags['public_transport'];
                    if (r === 'station' || r === 'stop' || currentTags['subway'] === 'yes' || pt === 'station') {
                        features.push({
                            type: "Feature",
                            geometry: { type: "Point", coordinates: currentCoords },
                            properties: { 
                                type: "station", 
                                name: currentTags['name'] || currentTags['name:en'] || "車站" 
                            }
                        });
                    }
                }
                currentElement = null;
            }
            else if (line.startsWith('</way>')) {
                if (currentElement === 'way') {
                    const isBuilding = !!currentTags['building'];
                    const isHighway = !!currentTags['highway'];
                    
                    if (isBuilding || isHighway) {
                        if (currentCoords.length >= 2) {
                            let geomType = "LineString";
                            let coords = currentCoords;
                            
                            if (isBuilding && coords.length >= 4) {
                                if (coords[0][0] === coords[coords.length-1][0] && coords[0][1] === coords[coords.length-1][1]) {
                                    geomType = "Polygon";
                                    coords = [coords];
                                }
                            }
                            
                            features.push({
                                type: "Feature",
                                geometry: { type: geomType, coordinates: coords },
                                properties: {
                                    type: isBuilding ? "building" : "street",
                                    name: currentTags['name'] || currentTags['name:en'] || ""
                                }
                            });
                        }
                    }
                }
                currentElement = null;
            }
        }
        
        console.log(`Generated ${features.length} GeoJSON features successfully.`);
        if (features.length === 0) {
            alert("在檔案中沒有找到任何地鐵、街道或建築！");
            document.getElementById('upload-ui').style.display = 'none';
        }
        
        const geojson = { type: "FeatureCollection", features: features };
        renderMap(geojson);
    } catch (e) {
        alert("資料轉換時發生異常：" + e.message);
        console.error(e);
        document.getElementById('loading').innerText = "❌ 發生錯誤，請查看控制台";
    }
}

function renderMap(geojson) {
    document.getElementById('upload-ui').style.display = 'none';
    document.getElementById('map').style.display = 'block';
    
    try {
        const map = new maplibregl.Map({
            container: 'map',
            localIdeographFontFamily: "'Noto Sans', 'Noto Sans CJK SC', 'Helvetica Neue', Arial, sans-serif",
            style: {
                "version": 8,
                "name": "Earth Colors Default",
                "glyphs": "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
                "sources": {},
                "layers": [
                    {
                        "id": "background",
                        "type": "background",
                        "paint": { "background-color": "#f3efe6" } 
                    }
                ]
            },
            center: [114.16701, 22.33155], 
            zoom: 15
        });

        map.on('load', () => {
            map.addSource('osm-data', {
                type: 'geojson',
                data: geojson,
                tolerance: 0 
            });

            map.addLayer({
                "id": "buildings",
                "type": "fill",
                "source": "osm-data",
                "filter": ["==", "type", "building"],
                "paint": {
                    "fill-color": "#d6cca4",
                    "fill-opacity": 0.85,
                    "fill-outline-color": "#bfae83"
                }
            });

            map.addLayer({
                "id": "streets",
                "type": "line",
                "source": "osm-data",
                "filter": ["==", "type", "street"],
                "paint": {
                    "line-color": "#a46d3e",
                    "line-width": ["interpolate", ["linear"], ["zoom"], 13, 2, 16, 5],
                    "line-opacity": 0.7
                }
            });

            map.addLayer({
                "id": "street-names",
                "type": "symbol",
                "source": "osm-data",
                "filter": ["==", "type", "street"],
                "layout": {
                    "symbol-placement": "line",
                    "text-field": ["get", "name"],
                    "text-font": ["Open Sans Regular"],
                    "text-size": 13,
                    "symbol-spacing": 250
                },
                "paint": {
                    "text-color": "#5d4d3a",
                    "text-halo-color": "#f3efe6",
                    "text-halo-width": 2
                }
            });

            map.addLayer({
                "id": "stations",
                "type": "circle",
                "source": "osm-data",
                "filter": ["==", "type", "station"],
                "paint": {
                    "circle-color": "#ab4a3b", 
                    "circle-radius": 8,
                    "circle-stroke-width": 2,
                    "circle-stroke-color": "#ffffff"
                }
            });

            map.addLayer({
                "id": "station-names",
                "type": "symbol",
                "source": "osm-data",
                "filter": ["==", "type", "station"],
                "layout": {
                    "text-field": ["get", "name"],
                    "text-font": ["Open Sans Bold"],
                    "text-offset": [0, 1.2],
                    "text-anchor": "top",
                    "text-size": 14
                },
                "paint": {
                    "text-color": "#8c3b2e",
                    "text-halo-color": "#ffffff",
                    "text-halo-width": 2
                }
            });
        });
    } catch (e) {
        alert("地圖渲染時發生異常：" + e.message);
        console.error(e);
    }
}
</script>
</body>
</html>
